name: Backend Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: Deployment mode
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - deploy-update
          - deploy-full
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "bootstrap/**"
      - "config/**"
      - "database/**"
      - "lang/**"
      - "public/**"
      - "resources/**"
      - "routes/**"
      - "tests/**"
      - "composer.json"
      - "composer.lock"
      - "artisan"
      - "Envoy.blade.php"
      - ".github/workflows/backend-deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Resolve deploy mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy_mode=${{ github.event.inputs.deploy_mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_mode=deploy" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Envoy deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.BACKEND_DEPLOY_HOST }}
          username: ${{ secrets.BACKEND_DEPLOY_USER }}
          port: ${{ secrets.BACKEND_DEPLOY_PORT || 22 }}
          key: ${{ secrets.BACKEND_DEPLOY_SSH_KEY }}
          script: |
            cd /www/wwwroot/124.222.232.138_82/freight-erp-api
            git fetch --all --prune
            git checkout main
            git pull --ff-only origin main
            if [ "${{ steps.mode.outputs.deploy_mode }}" = "deploy-update" ]; then
              composer install --no-dev --optimize-autoloader
              php artisan migrate --force
            elif [ "${{ steps.mode.outputs.deploy_mode }}" = "deploy-full" ]; then
              composer install --no-dev --optimize-autoloader
              php artisan migrate --force
              php artisan snapshot:backfill
            fi
            php artisan optimize:clear
            php artisan optimize
            php artisan queue:restart
